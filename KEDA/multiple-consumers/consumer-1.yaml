apiVersion: v1
kind: ServiceAccount
metadata:
  name: consumer-1
  namespace: consumer-1
  labels:
    app: nginx

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: consumer-1
  labels:
    app: nginx
spec:
  replicas: 0
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      serviceAccountName: consumer-1
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
